<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Triad Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface-hover: #1a1a24;
  --border: #2a2a3a; --text: #e0e0e8; --text-muted: #6a6a7a; --text-dim: #4a4a5a;
  --accent: #5a7aff; --accent-glow: rgba(90,122,255,0.15);
  --triad-fill: #5a7aff; --triad-stroke: #8aa0ff; --triad-text: #fff;
  --pattern-note: #cc8800; --pattern-text: #fff;
  --fret-color: #3a3a4a; --string-color: #5a5a6a; --dot-muted: #4a4a5a;
  --tag-bg: #1a1a28; --tag-border: #2a2a3a;
  --selected-bg: rgba(90,122,255,0.12); --selected-border: #5a7aff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; padding: 20px 16px; }
.controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 500; }
.control-options { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 2px; }
.control-btn {
  padding: 6px 10px; border: none; background: transparent; color: var(--text-muted);
  font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer;
  border-radius: 4px; transition: all 0.15s; white-space: nowrap;
}
.control-btn:hover { color: var(--text); background: var(--surface-hover); }
.control-btn.active { color: var(--accent); background: var(--accent-glow); }
.main-fretboard { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 12px 8px; margin-bottom: 24px; }
.main-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.chord-name { color: var(--accent); }
.inv-tag { font-size: 9px; padding: 2px 6px; background: var(--tag-bg); border: 1px solid var(--tag-border); border-radius: 3px; color: var(--text-muted); font-weight: 400; }
.patterns-header { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
.patterns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.pattern-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; cursor: pointer; transition: all 0.15s; }
.pattern-card:hover { border-color: var(--text-dim); background: var(--surface-hover); }
.pattern-card.selected { border-color: var(--selected-border); background: var(--selected-bg); }
.pattern-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.pattern-desc { font-size: 9px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.pattern-notes-list { font-size: 9px; color: var(--text-dim); margin-top: 4px; }
.print-btn {
  padding: 6px 14px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text-muted); font-family: inherit; font-size: 11px; font-weight: 500;
  cursor: pointer; border-radius: 4px; transition: all 0.15s;
}
.print-btn:hover { color: var(--text); background: var(--surface-hover); border-color: var(--accent); }
svg { width: 100%; height: auto; display: block; }

@media print {
  :root {
    --bg: #fff; --surface: #fff; --surface-hover: #fff; --border: #ccc;
    --text: #111; --text-muted: #555; --text-dim: #888;
    --accent: #2255cc; --accent-glow: transparent;
    --triad-fill: #2255cc; --triad-stroke: #4477ee; --triad-text: #fff;
    --pattern-note: #cc8800; --pattern-text: #fff;
    --fret-color: #bbb; --string-color: #999; --dot-muted: #ccc;
    --tag-bg: #f0f0f0; --tag-border: #ccc;
    --selected-bg: #eef2ff; --selected-border: #2255cc;
  }
  body { padding: 12px; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  .main-fretboard { border: 1px solid #ccc; break-inside: avoid; margin-bottom: 12px; }
  .patterns-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .pattern-card { border: 1px solid #ccc; break-inside: avoid; padding: 6px; }
  .pattern-card.selected { border: 2px solid #2255cc; }
}
@media not print { .print-only { display: none; } }
</style>
</head>
<body>

<div id="print-header" class="print-only" style="margin-bottom:12px"></div>
<div id="controls" class="controls no-print"></div>
<div id="main-board"></div>
<div class="patterns-header">Jump to pattern — triad notes highlighted in blue</div>
<div id="patterns" class="patterns-grid"></div>

<script>
const NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const TUNING=[4,11,7,2,9,4];
const STR_NAMES=["E","B","G","D","A","E"];
const NUM_FRETS=15;
const ni=n=>NOTES.indexOf(n);
const nn=i=>NOTES[((i%12)+12)%12];
const TI={major:[0,4,7],minor:[0,3,7]};

function triadNotes(root,q,inv){
  let d=TI[q].map(i=>(ni(root)+i)%12);
  for(let i=0;i<inv;i++) d.push(d.shift());
  return d;
}
function degLabels(inv){
  const r=["1","3","5"];
  for(let i=0;i<inv;i++) r.push(r.shift());
  return r;
}
function findTriad(root,q,inv,ss){
  const tn=triadNotes(root,q,inv), lb=degLabels(inv), cands=[];
  for(let i=0;i<3;i++){
    const si=ss+i; if(si>=6)return null;
    const base=((tn[2-i]-TUNING[si])%12+12)%12, frets=[];
    for(let f=base;f<=NUM_FRETS;f+=12) frets.push(f);
    cands.push({si,frets,target:tn[2-i],deg:lb[2-i]});
  }
  let best=null,bs=999;
  for(const a of cands[0].frets)for(const b of cands[1].frets)for(const c of cands[2].frets){
    const s=Math.max(a,b,c)-Math.min(a,b,c);
    if(s<bs){bs=s;best=[a,b,c];}
  }
  if(!best||bs>5)return null;
  return cands.map((c,i)=>({string:c.si,fret:best[i],note:nn(c.target),degree:c.deg}));
}

const modes=[
  {name:"Ionian",steps:[0,2,4,5,7,9,11],desc:"Mode 1 — major scale"},
  {name:"Dorian",steps:[0,2,3,5,7,9,10],desc:"Mode 2 — minor with bright 6th"},
  {name:"Phrygian",steps:[0,1,3,5,7,8,10],desc:"Mode 3 — minor with flat 2nd"},
  {name:"Lydian",steps:[0,2,4,6,7,9,11],desc:"Mode 4 — major with sharp 4th"},
  {name:"Mixolydian",steps:[0,2,4,5,7,9,10],desc:"Mode 5 — major with flat 7th"},
  {name:"Aeolian",steps:[0,2,3,5,7,8,10],desc:"Mode 6 — natural minor"},
  {name:"Locrian",steps:[0,1,3,5,6,8,10],desc:"Mode 7 — diminished"},
];

function genPatterns(root,quality){
  const ri=ni(root),iv=(ri+5)%12,v=(ri+7)%12,ii=(ri+2)%12,vi=(ri+9)%12,iii=(ri+4)%12;
  const cn=(r,q)=>TI[q].map(i=>(r+i)%12);
  const mp=r=>[0,2,4,7,9].map(s=>(r+s)%12);
  const mnp=r=>[0,3,5,7,10].map(s=>(r+s)%12);
  const p=[];
  p.push({name:`ii — ${nn(ii)} minor`,notes:cn(ii,"minor"),desc:"The two chord"});
  p.push({name:`iii — ${nn(iii)} minor`,notes:cn(iii,"minor"),desc:"The three chord"});
  p.push({name:`IV — ${nn(iv)} major`,notes:cn(iv,"major"),desc:"The four chord"});
  p.push({name:`V — ${nn(v)} major`,notes:cn(v,"major"),desc:"The five chord"});
  p.push({name:`vi — ${nn(vi)} minor`,notes:cn(vi,"minor"),desc:"Relative minor"});
  if(quality==="minor"){const rel=(ri+3)%12;p.push({name:`III — ${nn(rel)} major`,notes:cn(rel,"major"),desc:"Relative major"});}
  p.push({name:`${root} major pentatonic`,notes:mp(ri),desc:"5-note major scale"});
  p.push({name:`${nn(vi)} minor pentatonic`,notes:mnp(vi),desc:"Relative minor pentatonic"});
  if(quality==="minor") p.push({name:`${root} minor pentatonic`,notes:mnp(ri),desc:"5-note minor scale"});
  for(const m of modes) p.push({name:`${root} ${m.name}`,notes:m.steps.map(s=>(ri+s)%12),desc:m.desc});
  return p;
}

function fretRange(tp,pad=4){
  const fs=tp.map(p=>p.fret);
  return[Math.max(-1,Math.min(...fs)-pad),Math.min(NUM_FRETS,Math.max(...fs)+pad)];
}

function svgFretboard(tp,patNotes,fr,compact){
  const [sf,ef]=fr, nf=ef-sf;
  const ss=compact?18:24, fs=compact?40:48, tp2=compact?20:28, lp=compact?12:16;
  const w=lp+nf*fs+20, h=tp2+5*ss+20, dr=compact?8:10;
  const dots=[3,5,7,9,12,15];
  let s=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  // fret dots
  for(const d of dots){
    if(d<sf+1||d>ef)continue;
    const x=lp+(d-sf-1)*fs+fs/2;
    if(d===12){
      s+=`<circle cx="${x}" cy="${tp2+1.5*ss}" r="3" fill="var(--dot-muted)" opacity="0.4"/>`;
      s+=`<circle cx="${x}" cy="${tp2+3.5*ss}" r="3" fill="var(--dot-muted)" opacity="0.4"/>`;
    } else s+=`<circle cx="${x}" cy="${tp2+2.5*ss}" r="3" fill="var(--dot-muted)" opacity="0.3"/>`;
  }
  // fret lines
  for(let i=0;i<=nf;i++){
    const x=lp+i*fs, fn=sf+i, nut=fn===0;
    s+=`<line x1="${x}" y1="${tp2}" x2="${x}" y2="${tp2+5*ss}" stroke="var(--fret-color)" stroke-width="${nut?3:1}" opacity="${nut?0.8:0.3}"/>`;
  }
  // strings
  for(let i=0;i<6;i++){
    const y=tp2+i*ss;
    s+=`<line x1="${lp}" y1="${y}" x2="${lp+nf*fs}" y2="${y}" stroke="var(--string-color)" stroke-width="${(1+i*0.3).toFixed(1)}" opacity="0.5"/>`;
  }
  // fret numbers
  for(let i=0;i<nf;i++){
    const fn=sf+i+1; if(fn<0)continue;
    s+=`<text x="${lp+i*fs+fs/2}" y="${h-2}" text-anchor="middle" font-size="${compact?8:9}" fill="var(--text-muted)" font-family="monospace">${fn}</text>`;
  }

  // build triad map
  const tmap={};
  tp.filter(p=>p.fret>=sf&&p.fret<=ef).forEach(p=>{tmap[`${p.string}-${p.fret}`]=p;});
  const pset=patNotes?new Set(patNotes):null;
  const off=compact?6:8, smR=compact?6:7.5;

  // pattern + overlap notes
  if(pset){
    for(let si=0;si<6;si++){
      for(let fi=0;fi<nf;fi++){
        const fret=sf+fi+1; if(fret<0||fret>NUM_FRETS)continue;
        const nat=(TUNING[si]+fret)%12;
        if(!pset.has(nat))continue;
        const k=`${si}-${fret}`, cx=lp+fi*fs+fs/2, cy=tp2+si*ss;
        if(tmap[k]){
          const t=tmap[k];
          s+=`<circle cx="${cx-off}" cy="${cy}" r="${smR}" fill="var(--triad-fill)" stroke="var(--triad-stroke)" stroke-width="1.5"/>`;
          s+=`<text x="${cx-off}" y="${cy+(compact?3:3.5)}" text-anchor="middle" font-size="${compact?7:8}" fill="var(--triad-text)" font-weight="700" font-family="monospace">${t.degree}</text>`;
          s+=`<circle cx="${cx+off}" cy="${cy}" r="${smR-1}" fill="var(--pattern-note)" opacity="0.7"/>`;
          s+=`<text x="${cx+off}" y="${cy+3}" text-anchor="middle" font-size="${compact?6:7}" fill="var(--pattern-text)" font-family="monospace" font-weight="500">${nn(nat)}</text>`;
        } else {
          s+=`<circle cx="${cx}" cy="${cy}" r="${dr-2}" fill="var(--pattern-note)" opacity="0.6"/>`;
          s+=`<text x="${cx}" y="${cy+3}" text-anchor="middle" font-size="${compact?7:8}" fill="var(--pattern-text)" font-family="monospace" font-weight="500">${nn(nat)}</text>`;
        }
      }
    }
  }
  // triad-only notes
  tp.filter(p=>p.fret>=sf&&p.fret<=ef).forEach(p=>{
    const nat=(TUNING[p.string]+p.fret)%12;
    if(pset&&pset.has(nat))return;
    const fi=p.fret-sf-1, cx=lp+fi*fs+fs/2, cy=tp2+p.string*ss;
    s+=`<circle cx="${cx}" cy="${cy}" r="${dr}" fill="var(--triad-fill)" stroke="var(--triad-stroke)" stroke-width="2"/>`;
    s+=`<text x="${cx}" y="${cy+(compact?3:3.5)}" text-anchor="middle" font-size="${compact?8:10}" fill="var(--triad-text)" font-weight="700" font-family="monospace">${p.degree}</text>`;
  });

  s+=`</svg>`;
  return s;
}

// State
let state={root:"G",quality:"major",inversion:1,stringGroup:2,selectedPattern:null};
const ROOTS=NOTES;
const QUALS=["major","minor"];
const INVS=["Root position","1st inversion","2nd inversion"];
const SGS=[{label:"E-B-G",idx:0},{label:"B-G-D",idx:1},{label:"G-D-A",idx:2},{label:"D-A-E",idx:3}];

function render(){
  const {root,quality,inversion,stringGroup,selectedPattern}=state;
  const sg=SGS[stringGroup];
  const tp=findTriad(root,quality,inversion,sg.idx);
  const patterns=genPatterns(root,quality);
  const title=`${root} ${quality} — ${INVS[inversion]} — ${sg.label} strings`;

  // Print header
  const tn=triadNotes(root,quality,inversion).map(n=>nn(n)).join(" – ");
  document.getElementById("print-header").innerHTML=
    `<div style="font-size:18px;font-weight:700;color:var(--text)">${title}</div>`+
    `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">Triad notes: ${tn} · <span style="color:var(--triad-fill)">●</span> triad · <span style="color:var(--pattern-note)">●</span> pattern</div>`;

  // Controls
  function btnRow(items,current,key){
    return items.map((item,i)=>{
      const label=typeof item==="string"?item:(item.label||item);
      const val=typeof item==="string"?item:i;
      const active=current===val||current===i;
      return `<button class="control-btn ${active?"active":""}" data-key="${key}" data-val="${typeof item==="string"?item:i}">${label}</button>`;
    }).join("");
  }
  let ctrl=`<div class="control-group"><div class="control-label">Root</div><div class="control-options">${btnRow(ROOTS,root,"root")}</div></div>`;
  ctrl+=`<div class="control-group"><div class="control-label">Quality</div><div class="control-options">${btnRow(QUALS,quality,"quality")}</div></div>`;
  ctrl+=`<div class="control-group"><div class="control-label">Inversion</div><div class="control-options">${btnRow(INVS,inversion,"inversion")}</div></div>`;
  ctrl+=`<div class="control-group"><div class="control-label">Strings</div><div class="control-options">${btnRow(SGS.map(s=>s.label),stringGroup,"stringGroup")}</div></div>`;
  ctrl+=`<div class="control-group" style="justify-content:flex-end"><button class="print-btn" id="printBtn">🖨 Print this view</button></div>`;
  document.getElementById("controls").innerHTML=ctrl;

  if(!tp){
    document.getElementById("main-board").innerHTML=`<div style="padding:40px;text-align:center;color:var(--text-muted)">That voicing doesn't fit. Try a different combination.</div>`;
    document.getElementById("patterns").innerHTML="";
    attachEvents();
    return;
  }

  const fr=fretRange(tp,4);
  const activePat=selectedPattern!==null?patterns[selectedPattern]:null;
  const activeNotes=activePat?activePat.notes:null;

  // Main fretboard
  let mainTitle=`<span class="chord-name">${root} ${quality}</span><span class="inv-tag">${INVS[inversion]}</span><span class="inv-tag">${sg.label} strings</span>`;
  if(activePat) mainTitle+=`<span class="inv-tag" style="border-color:var(--pattern-note);color:var(--pattern-note)">+ ${activePat.name}</span>`;
  document.getElementById("main-board").innerHTML=
    `<div class="main-fretboard"><div class="main-title">${mainTitle}</div>${svgFretboard(tp,activeNotes,fr,false)}</div>`;

  // Pattern cards
  let cards="";
  patterns.forEach((p,i)=>{
    const sel=selectedPattern===i?"selected":"";
    cards+=`<div class="pattern-card ${sel}" data-pattern="${i}">
      <div class="pattern-name">${p.name}</div>
      <div class="pattern-desc">${p.desc}</div>
      ${svgFretboard(tp,p.notes,fr,true)}
      <div class="pattern-notes-list">${p.notes.map(n=>nn(n)).join(" · ")}</div>
    </div>`;
  });
  document.getElementById("patterns").innerHTML=cards;

  attachEvents();
}

function attachEvents(){
  document.querySelectorAll(".control-btn").forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.key, v=btn.dataset.val;
      if(k==="root") state.root=v;
      else if(k==="quality") state.quality=v;
      else if(k==="inversion") state.inversion=parseInt(v);
      else if(k==="stringGroup") state.stringGroup=parseInt(v);
      state.selectedPattern=null;
      render();
    };
  });
  document.querySelectorAll(".pattern-card").forEach(card=>{
    card.onclick=()=>{
      const i=parseInt(card.dataset.pattern);
      state.selectedPattern=state.selectedPattern===i?null:i;
      render();
    };
  });
  const pb=document.getElementById("printBtn");
  if(pb) pb.onclick=()=>window.print();
}

render();
</script>
</body>
</html>
